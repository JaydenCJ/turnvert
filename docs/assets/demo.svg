<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="430" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">turnvert — four harness logs, one JSONL schema</text>

  <text x="24" y="64" fill="#7ee787">$ turnvert detect logs/*</text>
  <text x="24" y="86" fill="#c9d1d9">logs/9f8f61c2.jsonl            <tspan fill="#79c0ff">claude-code</tspan></text>
  <text x="24" y="104" fill="#c9d1d9">logs/rollout-2026-07-06.jsonl  <tspan fill="#79c0ff">codex</tspan></text>
  <text x="24" y="122" fill="#c9d1d9">logs/.aider.chat.history.md    <tspan fill="#79c0ff">aider</tspan></text>
  <text x="24" y="140" fill="#c9d1d9">logs/openhands-events.json     <tspan fill="#79c0ff">openhands</tspan></text>

  <text x="24" y="174" fill="#7ee787">$ turnvert convert logs/* --out all.jsonl &amp;&amp; turnvert validate all.jsonl</text>
  <text x="24" y="196" fill="#c9d1d9"><tspan fill="#3fb950">OK:</tspan> 40 event(s), 5 session(s)</text>

  <text x="24" y="228" fill="#7ee787">$ head -3 all.jsonl</text>
  <text x="24" y="250" fill="#8b949e">{"v":1,"seq":1,"event":<tspan fill="#d29922">"session_start"</tspan>,"harness":"claude-code","meta":{...}}</text>
  <text x="24" y="268" fill="#8b949e">{"v":1,"seq":2,"event":<tspan fill="#d29922">"note"</tspan>,"text":"Fix ERR_MODULE_NOT_FOUND in npm test"}</text>
  <text x="24" y="286" fill="#8b949e">{"v":1,"seq":3,"event":<tspan fill="#d29922">"message"</tspan>,"role":"user","text":"Why does `npm test` fail wi…"}</text>

  <text x="24" y="320" fill="#7ee787">$ turnvert stats all.jsonl</text>
  <text x="24" y="342" fill="#8b949e">SESSION            HARNESS      EVENTS  MSGS  TOOLS  ERRS  TOKENS IN/OUT</text>
  <text x="24" y="360" fill="#c9d1d9">9f8f61c2-4a2e-4b…  claude-code  9       3     2      0     9273/268</text>
  <text x="24" y="378" fill="#c9d1d9">0198f3f2-77aa-7c…  codex        6       3     1      0     3090/128</text>
  <text x="24" y="396" fill="#c9d1d9">aider-2026-07-04…  aider        13      4     0      0     5500/560</text>
  <text x="24" y="414" fill="#8b949e">one documented schema · content-first detection · offline · zero deps</text>
</svg>
